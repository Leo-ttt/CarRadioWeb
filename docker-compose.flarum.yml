# Flarum 使用 PHP 8.3 的社区镜像，以兼容最新扩展（如 fof/upload 需 PHP 8.1+）
# 参考: https://github.com/crazy-max/docker-flarum  端口 8000→8888 保持与现有一致
services:
  flarum:
    image: crazymax/flarum:edge
    container_name: flarum_app
    environment:
      - FLARUM_BASE_URL=${FLARUM_BASE_URL}
      - FLARUM_FORUM_TITLE=My Community
      - DB_HOST=flarum_db
      - DB_NAME=flarum
      - DB_USER=flarum
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PREFIX=flarum_
      - DB_PORT=3306
    volumes:
      - flarum_data:/data
    ports:
      - "8888:8000"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mariadb:10.5
    container_name: flarum_db
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=flarum
      - MYSQL_USER=flarum
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - flarum_db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  flarum_db_data:
  flarum_data:
