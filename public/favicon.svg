<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 背景圆形 -->
  <circle cx="32" cy="32" r="32" fill="#3B82F6"/>
  
  <!-- 车子图标 -->
  <g transform="translate(12, 20)">
    <!-- 车身 -->
    <path d="M4 16 L8 8 L32 8 L36 16 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5"/>
    <rect x="2" y="16" width="36" height="8" rx="2" fill="#FFFFFF"/>
    
    <!-- 车窗 -->
    <path d="M10 10 L12 12 L28 12 L30 10 Z" fill="#3B82F6"/>
    
    <!-- 车轮 -->
    <circle cx="10" cy="24" r="3" fill="#1E40AF" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="30" cy="24" r="3" fill="#1E40AF" stroke="#FFFFFF" stroke-width="1"/>
  </g>
  
  <!-- 导航图标 (定位针) -->
  <g transform="translate(42, 12)">
    <path d="M8 0 L12 8 L8 6 L4 8 Z" fill="#10B981" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="8" cy="2" r="1.5" fill="#FFFFFF"/>
  </g>
</svg>
