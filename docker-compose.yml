version: '3.8'

services:
  # Web 应用服务
  web:
    build: .
    container_name: automotivehu-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/knowledge-base
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET}
      OSS_REGION: ${OSS_REGION}
      OSS_ENDPOINT: ${OSS_ENDPOINT}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./backend/uploads:/app/backend/uploads

  # MongoDB 数据库
  mongo:
    image: mongo:6
    container_name: automotivehu-mongo
    ports:
      - "27017:27017"
    environment:
      # 安全警告：必须通过 .env 文件或环境变量设置以下值
      # 不要使用默认凭据！
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:?MONGO_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: knowledge-base
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    restart: unless-stopped
    networks:
      - app-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: automotivehu-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: automotivehu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

# 数据卷
volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
  redis-data:
    driver: local

# 网络
networks:
  app-network:
    driver: bridge

